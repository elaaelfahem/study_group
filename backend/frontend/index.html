<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Group — Virtual Study Room</title>
    <meta name="description" content="An AI-powered virtual study room with interactive animated avatars that move, talk, and react in real-time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- ── Header ── -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">🧠</span>
                    <span class="logo-text">Study Group</span>
                </div>
            </div>
            <div class="header-center">
                <input type="text" id="topicInput" class="topic-input" placeholder="Enter study topic..." value="Photosynthesis">
                <select id="modeSelect" class="mode-select">
                    <option value="teaching">📖 Teaching</option>
                    <option value="exam_prep">📝 Exam Prep</option>
                    <option value="deep_understanding">🔬 Deep Understanding</option>
                    <option value="quick_review">⚡ Quick Review</option>
                </select>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="theme-toggle" title="Toggle Light/Dark Mode">
                    <span class="theme-icon">🌙</span>
                </button>
                <button id="voiceToggle" class="voice-toggle active" title="Toggle AI voices">
                    <span class="voice-icon">🔊</span>
                </button>
                <div class="pomodoro" id="pomodoro">
                    <div class="pomodoro-ring">
                        <svg viewBox="0 0 36 36">
                            <path class="pomodoro-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="pomodoro-fill" id="pomodoroFill" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <span class="pomodoro-time" id="pomodoroTime">25:00</span>
                    </div>
                    <button class="pomodoro-btn" id="pomodoroBtn" title="Start Pomodoro">▶</button>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main class="main-content">

            <!-- ── Virtual Study Room ── -->
            <section class="virtual-room" id="virtualRoom">
                <!-- Ambient Layer (Particles & Lighting) -->
                <div class="ambient-layer" id="ambientLayer"></div>
                <div class="volumetric-light"></div>

                <!-- Room Floor -->
                <div class="room-floor">
                    <div class="floor-grid"></div>
                    <div class="floor-glow"></div>
                </div>

                <!-- Study Table -->
                <div class="study-table">
                    <div class="table-surface"></div>
                    <div class="table-light"></div>
                    <div class="table-topic-display">
                        <span class="table-label">CURRENT TOPIC</span>
                        <h2 class="table-topic" id="tableTopic">Photosynthesis</h2>
                    </div>
                </div>

                <!-- ── Characters (7-person circular layout) ── -->

                <!-- You (the student) — bottom center of circle -->
                <div class="character character-you" id="char-you" data-persona="you" style="left:50%;top:82%;">
                    <div class="char-body">
                        <div class="char-glow"></div>
                        <div class="char-img char-img-video" id="selfCamCircle">
                            <video id="userVideo" autoplay muted playsinline></video>
                            <div class="self-placeholder">👤</div>
                        </div>
                    </div>
                    <div class="char-plate"><span class="plate-dot plate-dot-you"></span><span>You</span><span class="plate-emoji">🎓</span></div>
                    <div class="char-shadow"></div>
                </div>

                <!-- The Genius — left -->
                <div class="character" id="char-genius" data-persona="genius" style="left:12%;top:38%;">
                    <div class="char-reaction" id="reaction-genius"></div>
                    <div class="char-speech" id="speech-genius">
                        <p class="speech-text"></p>
                    </div>
                    <div class="char-body">
                        <div class="char-glow"></div>
                        <img class="char-img" src="/static/avatars/genius.png" alt="The Genius" draggable="false">
                    </div>
                    <div class="char-plate"><span class="plate-dot"></span><span>The Genius</span><span class="plate-emoji">🧠</span></div>
                    <div class="char-shadow"></div>
                </div>

                <!-- The Confused — upper-left -->
                <div class="character" id="char-confused" data-persona="confused" style="left:50%;top:16%;">
                    <div class="char-reaction" id="reaction-confused"></div>
                    <div class="char-speech" id="speech-confused">
                        <p class="speech-text"></p>
                    </div>
                    <div class="char-body">
                        <div class="char-glow"></div>
                        <img class="char-img" src="/static/avatars/confused.png" alt="The Confused" draggable="false">
                    </div>
                    <div class="char-plate"><span class="plate-dot"></span><span>The Confused</span><span class="plate-emoji">🤔</span></div>
                    <div class="char-shadow"></div>
                </div>

                <!-- The Skeptic — upper-right -->
                <div class="character" id="char-skeptic" data-persona="skeptic" style="left:78%;top:38%;">
                    <div class="char-reaction" id="reaction-skeptic"></div>
                    <div class="char-speech" id="speech-skeptic">
                        <p class="speech-text"></p>
                    </div>
                    <div class="char-body">
                        <div class="char-glow"></div>
                        <img class="char-img" src="/static/avatars/skeptic.png" alt="The Skeptic" draggable="false">
                    </div>
                    <div class="char-plate"><span class="plate-dot"></span><span>The Skeptic</span><span class="plate-emoji">🔍</span></div>
                    <div class="char-shadow"></div>
                </div>

                <!-- The Summarizer — lower-left -->
                <div class="character" id="char-summarizer" data-persona="summarizer" style="left:18%;top:68%;">
                    <div class="char-reaction" id="reaction-summarizer"></div>
                    <div class="char-speech" id="speech-summarizer">
                        <p class="speech-text"></p>
                    </div>
                    <div class="char-body">
                        <div class="char-glow"></div>
                        <img class="char-img" src="/static/avatars/summarizer.png" alt="The Summarizer" draggable="false">
                    </div>
                    <div class="char-plate"><span class="plate-dot"></span><span>The Summarizer</span><span class="plate-emoji">📝</span></div>
                    <div class="char-shadow"></div>
                </div>

                <!-- Quiz Master — lower-right -->
                <div class="character" id="char-quiz_master" data-persona="quiz_master" style="left:72%;top:68%;">
                    <div class="char-reaction" id="reaction-quiz_master"></div>
                    <div class="char-speech" id="speech-quiz_master">
                        <p class="speech-text"></p>
                    </div>
                    <div class="char-body">
                        <div class="char-glow"></div>
                        <img class="char-img" src="/static/avatars/quiz_master.png" alt="Quiz Master" draggable="false">
                    </div>
                    <div class="char-plate"><span class="plate-dot"></span><span>Quiz Master</span><span class="plate-emoji">🎯</span></div>
                    <div class="char-shadow"></div>
                </div>

                <!-- Room Controls -->
                <div class="room-controls">
                    <button id="micBtn" class="ctrl-btn mic-btn" title="Hold to speak">🎙️</button>
                    <button id="toggleChatBtn" class="ctrl-btn" title="Toggle Chat">💬</button>
                    <button class="ctrl-btn end-btn" title="End Session">🛑</button>
                </div>
            </section>

            <!-- ── Chat Panel ── -->
            <aside class="chat-panel" id="chatPanel">
                <div class="chat-header"><h3>Group Chat</h3></div>
                <div class="messages" id="messages">
                    <div class="system-msg join-msg">🧠 Study room is ready — say something to begin!</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
                    <button id="sendBtn" class="send-btn">Send</button>
                </div>
            </aside>
        </main>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
            <div class="spinner-ring"></div>
        </div>
        <p class="loading-text" id="loadingText">Study group is thinking...</p>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
